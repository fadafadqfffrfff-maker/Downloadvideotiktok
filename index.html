<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Downloader Premium</title>
    <!-- Icon-icon pendukung -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Khusus Mobile-First */
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #090514 100%);
            color: #d1d5db;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background-color: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            margin-top: 10px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #22d3ee, #c084fc, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #9ca3af;
            margin: 6px 0 0 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-field {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid #4b5563;
            border-radius: 12px;
            padding: 14px 40px 14px 14px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #22d3ee;
        }

        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(to right, #22d3ee, #a855f7);
            color: #ffffff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(34, 211, 238, 0.2);
        }

        .submit-btn:disabled {
            opacity: 0.5;
        }

        #loading {
            display: none;
            text-align: center;
            margin: 24px 0;
        }

        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3.5px solid #22d3ee;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            font-size: 13px;
            color: #9ca3af;
            margin: 8px 0 0 0;
        }

        #errorMessage {
            display: none;
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            font-size: 13px;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            text-align: center;
        }

        #resultCard {
            display: none;
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
        }

        .author-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #4b5563;
            object-fit: cover;
        }

        .author-meta {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .author-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .video-title {
            font-size: 12px;
            color: #9ca3af;
            margin: 2px 0 0 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .download-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            color: #ffffff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
        }

        .btn-hd { background-color: #0891b2; }
        .btn-normal { background-color: #059669; } /* Warna hijau untuk membedakan */
        .btn-wm { background-color: #374151; }
        .btn-mp3 { background-color: #9333ea; }

        .footer {
            font-size: 11px;
            color: #4b5563;
            margin-top: 20px;
            text-align: center;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="title"><i class="fab fa-tiktok"></i>TT Downloader</h1>
            <p class="subtitle">Unduh video TikTok tanpa watermark & MP3 gratis</p>
        </div>

        <!-- Input Form -->
        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" id="tiktokUrl" class="input-field" placeholder="Tempelkan link video TikTok di sini...">
                <button type="button" class="clear-btn" id="clearInputBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button type="button" id="btnSubmit" class="submit-btn">
                <i class="fas fa-download"></i> Ambil Video
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading">
            <div class="spinner"></div>
            <p class="loading-text">Sedang memproses, tunggu sebentar...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage">
            <i class="fas fa-exclamation-triangle mr-1"></i> <span id="errorText">Gagal memproses link.</span>
        </div>

        <!-- Result Card -->
        <div id="resultCard">
            <!-- Info Pembuat Video -->
            <div class="author-info">
                <img id="authorAvatar" src="" alt="Avatar" class="author-avatar">
                <div class="author-meta">
                    <h3 id="authorName" class="author-name">Username</h3>
                    <p id="videoTitle" class="video-title">Caption video...</p>
                </div>
            </div>

            <!-- Tombol Download -->
            <div class="download-links">
                <a id="btnNoWatermarkHD" href="#" target="_blank" class="download-btn btn-hd">
                    <i class="fas fa-video"></i> Tanpa Watermark (HD)
                </a>
                <a id="btnNoWatermarkNormal" href="#" target="_blank" class="download-btn btn-normal">
                    <i class="fas fa-video"></i> Tanpa Watermark (Normal)
                </a>
                <a id="btnWithWatermark" href="#" target="_blank" class="download-btn btn-wm">
                    <i class="fas fa-film"></i> Dengan Watermark
                </a>
                <a id="btnAudio" href="#" target="_blank" class="download-btn btn-mp3">
                    <i class="fas fa-music"></i> Audio MP3
                </a>
            </div>
        </div>
    </div>

    <p class="footer">&copy; 2026 Powered by TikWM API</p>

    <!-- Logika JavaScript -->
    <script>
        const tiktokUrl = document.getElementById('tiktokUrl');
        const clearInputBtn = document.getElementById('clearInputBtn');
        const btnSubmit = document.getElementById('btnSubmit');
        const loading = document.getElementById('loading');
        const resultCard = document.getElementById('resultCard');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const authorAvatar = document.getElementById('authorAvatar');
        const authorName = document.getElementById('authorName');
        const videoTitle = document.getElementById('videoTitle');
        const btnNoWatermarkHD = document.getElementById('btnNoWatermarkHD');
        const btnNoWatermarkNormal = document.getElementById('btnNoWatermarkNormal');
        const btnWithWatermark = document.getElementById('btnWithWatermark');
        const btnAudio = document.getElementById('btnAudio');

        clearInputBtn.addEventListener('click', () => {
            tiktokUrl.value = '';
            tiktokUrl.focus();
        });

        btnSubmit.addEventListener('click', processVideo);

        async function processVideo() {
            const urlInput = tiktokUrl.value.trim();

            errorMessage.style.display = 'none';
            resultCard.style.display = 'none';

            if (!urlInput) {
                showError('Silakan tempelkan link TikTok terlebih dahulu!');
                return;
            }

            loading.style.display = 'block';
            btnSubmit.disabled = true;

            try {
                const response = await fetch('https://www.tikwm.com/api/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        'url': urlInput,
                        'hd': '1' // Minta data HD sekalian dari server
                    })
                });

                const data = await response.json();

                if (data.code === 0 && data.data) {
                    const videoData = data.data;

                    authorAvatar.src = videoData.author.avatar;
                    authorName.innerText = `@${videoData.author.unique_id}`;
                    videoTitle.innerText = videoData.title || 'Tidak ada caption';

                    // Set tautan unduhan masing-masing tombol
                    btnNoWatermarkHD.href = videoData.hdplay || videoData.play; // Cari versi HD, kalau gak ada balik ke biasa
                    btnNoWatermarkNormal.href = videoData.play; // Murni resolusi bawaan/normal tanpa HD
                    btnWithWatermark.href = videoData.wmplay;
                    btnAudio.href = videoData.music;

                    resultCard.style.display = 'block';
                } else {
                    showError(data.msg || 'Link tidak valid atau video tidak ditemukan.');
                }

            } catch (error) {
                console.error(error);
                showError('Terjadi masalah koneksi ke server API.');
            } finally {
                loading.style.display = 'none';
                btnSubmit.disabled = false;
            }
        }

        function showError(message) {
            errorText.innerText = message;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
